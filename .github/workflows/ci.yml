name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: check out code
        uses: actions/checkout@v5

      - name: set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: run tests
        run: npm test
