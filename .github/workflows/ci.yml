name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run build
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: dist/

    test:
      needs: build
      runs-on: ubuntu-latest

      steps:
        - name: Check out code
          uses: actions/checkout@v5

        - name: Set up Node.js
          uses: actions/setup-node@v6
          with:
            node-version: "20"
            cache: "npm"

        - name: Install dependencies
          run: npm ci

        - name: Download build artifacts
          uses: actions/download-artifact@v4
          with:
            name: build-output
            path: dist/

        - name: Verify build output exists
          run: |
            echo "Contents of dist/:"
            ls -la dist/
            echo ""
            echo "Build info:"
            cat dist/build-info.json

        - name: Run tests
          run: npm test
